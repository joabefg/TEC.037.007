<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.svg">
    
    <title>RPG 2.0</title>
</head>
<body data-bs-theme="dark" style="background-image: url(assets/postapocalypse1.png);">
    <main class="container-md  py-5">

        <!-- Card de cadastro de usuário -->
        <div class="card text-center shadow-sm" id="card-cadastro">
            <!-- Título do card -->
            <div class="card-header" style="font-weight: bold;">
                Faça seu cadastro
            </div>
            <!-- Corpo do card -->
            <div class="card-body">
                <!-- Formulário de cadastro do personagem -->
                <form id="formulario-cadastro" class="form-control">
                    <!-- Inputs lado a lado -->
                    <div class="row g-2">
                        <!-- Coluna dos dados do personagem -->
                        <div class="col-6">
                            <!-- Card para o preenchimento dos dados do personagem -->
                            <div class="card">
                                <div class="card-header">Preencha com os dados do personagem</div>
                                <div class="card-body">
                                    <div class="form-floating mb-3"> <!-- Nome do heroi -->
                                        <input type="text" id="heroi-nome" class="form-control" placeholder="Digite o nome do heroi" required>
                                        <label for="heroi-nome">Digite o nome do seu personagem</label>
                                    </div>

                                    <div class="form-floating"> <!-- Titulo do heroi -->
                                        <input type="text" id="heroi-titulo" class="form-control" placeholder="Digite o nome do heroi" required>
                                        <label for="heroi-titulo">Digite o título do seu personagem</label>
                                    </div>

                                    <!-- Escolher tipo do personagem -->
                                    <div class="mt-3 row" aria-required="true">
                                        <h6 class="card-header">Em desenvolvimento</h6>

                                        <div class="col-6">
                                            <div class="form-check form-check-inline"> <!-- Escolher heroi -->
                                                <input class="btn-check" type="radio" name="escolha-personagem" id="escolha-heroi" disabled>
                                                <label class="btn" for="escolha-heroi">
                                                    <img src="assets/heroina-raquelly.png" class="img-thumbnail disabled" alt="">
                                                    Heroi
                                                </label>
                                            </div>
                                        </div> <!-- Col -->
                                        <div class="col-6">
                                            <div class="form-check form-check-inline"> <!-- Escolher heroi -->
                                                <input class="btn-check" type="radio" name="escolha-personagem" id="escolha-boss" disabled>
                                                <label class="btn" for="escolha-boss">
                                                    <img src="assets/boss-luiza.png" class="img-thumbnail" alt="">
                                                    Boss
                                                </label>
                                            </div>
                                        </div> <!--Col -->
                                        <button type="submit" class="btn btn-success mt-3 mb-3">Começar o jogo</button>
                                    </div> <!-- Escolher tipo personagem -->
                                </div> <!-- Card body -->
                            </div> <!-- Card -->
                        </div> <!-- Col 1 -->
                    </form> <!-- Formulário -->

                    <!-- Coluna da escolha do plano de fundo -->
                    <div class="col-6">
                        <!-- Card para a escolha do cenário -->
                        <div class="card">
                            <div class="card-header">Escolha um cenário</div>
                            <!-- Carrossel da escolha do cenário -->
                            <div id="escolha-cenario" class="carousel slide carousel-fade">
                                <div class="carousel-inner">
                                    <div class="carousel-item active">
                                        <img src="assets/City1.png" class="d-block w-100" alt="...">
                                    </div>
                                    <div class="carousel-item">
                                        <img src="assets/postapocalypse4.png" class="d-block w-100" alt="...">
                                    </div>
                                    <div class="carousel-item">
                                        <img src="assets/postapocalypse1.png" class="d-block w-100" alt="...">
                                    </div>
                                </div>
                                <button class="carousel-control-prev" type="button" data-bs-target="#escolha-cenario" data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon"></span>
                                    <span class="visually-hidden">Previous</span>
                                </button>
                                <button class="carousel-control-next" type="button" data-bs-target="#escolha-cenario" data-bs-slide="next">
                                    <span class="carousel-control-next-icon"></span>
                                    <span class="visually-hidden">Next</span>
                                </button>
                            </div> <!-- Carrossel -->
                        </div> <!-- Card -->
                    </div> <!--Col 2 -->
                </div> <!-- Row -->
            </div> <!-- Card body -->
        </div> <!-- Card de cadasto -->

        <!-- Card da tela inicial -->
        <div class="card text-center shadow-sm" id="card-jogo" hidden>
            <!-- Titulo card -->
            <div class="card-header" style="font-weight: bold;">
                RPG de guerra
                <div id="contador" style="font-weight: normal;">Turno: 4</div>
            </div>
            <!-- Corpo do card -->
            <div class="card-body" id="tela"
                style="background-image: url(assets/City1.png); background-size: contain;;">

                <div class="row">
                    <!-- Campo do herói -->
                    <div class="col-6">
                        <ul class="list-group float-end shadow-sm" data-bs-theme="light" style="width: 225px;">
                            <li class="list-group-item list-group-item-dark text-center"
                                id="heroi-nome-display" style="font-weight: 800;">Nome da heroina</li> <!-- Nome do heroi -->
                            <li class="list-group-item" id="heroi-desc-display">⚔️</li> <!-- Status de ação atual do herói -->
                            <li class="list-group-item"> <!-- Vida do heroi -->
                                🤍<progress id="heroi-vida-display" value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li class="list-group-item" id="grupo-heroi-mp"> <!-- Mp do herói -->
                                🧪<progress id="heroi-mana-display" value="100" max="100" style="accent-color: blue;"></progress>
                            </li>
                            <li class="list-group-item" id="grupo-heroi-en"> <!-- Energia do herói -->
                                ⚡<progress id="heroi-energia-display" value="0" max="100" style="accent-color: green;"></progress>
                            </li>
                        </ul>
                        <img src="assets/heroina-raquelly.png" class="img-thumbnail" id="heroi-imagem" alt="Imagem do heroi">
                    </div> <!-- Campo herói -->

                    <!-- Campo do boss -->
                    <div class="col-6">
                        <ul class="list-group float-start shadow-sm" data-bs-theme="light" style="width: 225px;">
                            <li class="list-group-item list-group-item-dark text-center"
                                id="boss-nome-display" style="font-weight: 800;">Nome do boss</li> <!-- Nome do heroi -->
                            <li class="list-group-item" id="boss-desc-display">🌑</li> <!-- Status de ação atual do herói -->
                            <li class="list-group-item"> <!-- Vida do heroi -->
                                🖤<progress id="boss-vida-display" value="100" max="150" style="accent-color: red;"></progress>
                            </li>
                            <li class="list-group-item"> <!-- Energia do herói -->
                                ⚡<progress id="boss-energia-display" value="0" max="100" style="accent-color: green;"></progress>
                            </li>
                        </ul>
                        <img src="assets/boss-luiza.png" class="img-thumbnail" id="boss-imagem" alt="Imagem do boss">
                    </div> <!-- Campo boss -->
                </div> <!-- Row -->
                
                <div class="row mt-3 mb-2">
                    <div class="col">
                        <div class="btn-group" role="group" id="button-box">
                            <!-- As habilidades são implementadas de forma dinamica por meio do javascript -->
                        </div>
                    </div>
                </div> <!-- Final linha (row) -->
            </div> <!-- Card body -->
            <div class="card-footer">
                <h5>logs</h5>
                <small class="text-muted" id="log-hero"></small>
                <p></p>
                <small class="text-muted" id="log-boss"></small>
            </div>
        </div> <!-- Card -->
    </main>

    <!-- Javascript personalizado -->
    <script src="script.js"></script>
    <!-- Javascript do bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
