<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastro - Personagens</title>
</head>
<body>
    <!-- Os dados serão pegos aqui -->
    <div class="card py-2 mt-5 mb-5 container text-center" id="desaparece">
        <div class="card-header">Esse desaparece por 2 segundos</div>
        <div class="card-body">
            Assim que o formulário for enviado esse card irá desaparecer
        </div>
    </div>

    <div class="card py-2 mt-5 mb-5 container text-center" hidden id="aparece">
        <div class="card-header">Esse aparece por 2 segundos</div>
        <div class="card-body">
            <p>Essas informações são provenientes do formulário abaixo</p>

            <p id="campo1"></p>
            <p id="campo2"></p>
        </div>
    </div>
    
    <form action="#" id="formulario_aplicacao" class="container form-control text-center">
        <h5 class="card-text">preencha as informações</h5>
        <input type="text" class="form-control mb-3" placeholder="titulo" id="titulo">
        <input type="text" class="form-control mb-3" placeholder="nome" id="nome">
        <button type="submit" class="form-control btn btn-success" id="envio">enviar</button>
    </form>

    <!-- Criar o formulário de cadastro -->
    <script>
        //Assim que o botão for pressionado, um card irá aparecer e o outro sumir
        let formulario = document.getElementById("formulario_aplicacao");
        let primeiro_campo = document.getElementById("campo1");
        let segundo_campo = document.getElementById("campo2");

        //Informações que serão coletadas do formulario
        let info1 = document.getElementById("titulo");
        let info2 = document.getElementById("nome");

        //Acessando os elementos dos cards
        let card_desaparece = document.getElementById("desaparece");
        let card_aparece = document.getElementById("aparece");

        formulario.addEventListener("submit", (e)=>{
            e.preventDefault();
            alert("dados enviados");

            //Essas informações serão adicionadas apenas quando o formulário for enviado
            primeiro_campo.innerText = `${info1.value}`;
            segundo_campo.innerText = `${info2.value}`;

            //Realizando a alteração das propriedades dos cards
            card_aparece.hidden = false;
            card_desaparece.hidden = true;

            //Faz com que após 2 segundos, o primeiro card volte a ser exibido
            setTimeout(()=>{
                card_aparece.hidden = true;
                card_desaparece.hidden = false;
            }, 2000)
        })
        
        
    </script>
</body>
</html>
