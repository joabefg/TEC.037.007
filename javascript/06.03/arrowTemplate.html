<script>
    //Criando um objeto do tipo usuário
    let usuario = {
        nome: "Raquelly",
        idade: 17,
        cidade: "Fercal"
    }

    //Criando uma arrow function
    const saudarUsuario = (nome, cidade) => {
        return `seja bem vindo ${nome}, você mora na cidade: ${cidade}`
    }

    //Utilizando a arrowfunction
    alert(saudarUsuario(usuario.nome, usuario.cidade))

</script>
