<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testando</title>
</head>
<body>
    <h1>Hello world!</h1>
    <script>
         let nota1 = Number( prompt("A sua primeira nota?"))
         let nota2 = Number (prompt("Qual a sua segunda nota?"))

         let result = (nota1+nota2)/2

         if (result >= 7){
            alert(` você passou com ${result} pontos !`)
         } else{
            let desc = 7 - result 
            alert(`Você não passou , faltou  ${desc} pontos`)
         }

         
    </script>
</body>
</html>
