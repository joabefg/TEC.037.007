<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
 
</head>

<body style="background: url('assets/noite majora.jpg') center/cover no-repeat;">
    <div class="container my-4">
        <div class="card border-0 bg-transparent">
            <div class="row g-3 p-3">
                <div class="col text-end">
                    <div class="card h-100 bg-transparent border-0">
                        <div class="card-body text-center"> 
                            <div class="card-title fw-bold text-white">link ⚔️</div>
                            <div class="mx-auto" style="width: 225px;">
                                <ul class="list-group bg-transparent">
                                    <li class="list-group-item bg-transparent border-0 d-flex justify-content-between align-items-center">
                                        ❤️
                                        <progress id="hp-link" value="200" max="200" class="w-75" style="accent-color: red; height: 14px;"></progress>
                                    </li>
                                    <li class="list-group-item bg-transparent border-0 d-flex justify-content-between align-items-center">
                                        ⚡
                                        <progress id="stamina-link" value="3" max="3" class="w-75" style="accent-color: rgb(1, 111, 255); height: 14px;"></progress>
                                    </li>
                                </ul>
                            
                            </div>
                            <img src="assets/legend-of-zelda-link.gif" width="280" height="280" class="img-fluid" alt="link">
                        </div>
                        <div class = "btn-group" id="col botoes">
                            <button type="button" class="btn btn-primary" id="attack-btn">Atacar</button>
                            <button type="button" class="btn btn-secondary" id="defend-btn">Defender</button>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card h-100 bg-transparent border-0">
                        <div class="card-body text-center">
                            <div class="card-title fw-bold text-white">Majoras 👹</div>
                            <div class="mx-auto" style="width: 225px;">
                                <ul class="list-group bg-transparent">
                                    <li class="list-group-item bg-transparent border-0 d-flex justify-content-between align-items-center">
                                        ❤️
                                        <progress id="hp-Majoras" value="130" max="130" class="w-75" style="width: 100%; height: 14px;"></progress>
                                    </li>
                                    <li class="list-group-item bg-transparent border-0 d-flex justify-content-between align-items-center">
                                        ⚡
                                        <progress id="stamina-Majoras" value="10" max="10" class="w-75" style="accent-color: orange; width: 100%; height: 14px;"></progress>
                                    </li>
                                </ul>
                            </div>
                            <img src="assets/majoras.gif" width="200" height="200" class="img-fluid" alt="Majoras">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer bg-transparent border-0">
                <!-- rodapé / borda para os dois cards -->
            </div>
        </div>
    </div>
</body>

</html>
