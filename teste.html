<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap: Form Variado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="ratio ratio-1x1">
                    <img src="https://picsum.photos/400" class="img-fluid rounded shadow-sm" alt="Thumbnail">
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="ratio ratio-1x1 border d-flex align-items-center justify-content-center bg-light rounded">
                    <span class="text-muted">+ 10 fotos</span>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
