<script>
    var  assentos = [
        [0, 0, 1],
        [0, 1, 0],
        [1, 0, 1]
    ]
    count = 0
    for (c = 0; c < 3; c++){
        for (i = 0; i < 3; i++){
            count += 1
            if (assentos[c][i] == 0){
                alert(count + "°- Assento está livre")
            }
            else{
                alert(count + "°- Assento está ocupado")
            }
        }
    }
</script>
