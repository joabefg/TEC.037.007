<script>
    var notas = [75, 60, 80, 70]
    var notaSoma = 0
    let resultado = "falha"
    for(c = 0; c < notas.length; c++ ){
        notaSoma = notas[c] + notaSoma

        media = notaSoma/notaSoma.length
        if (media < 70){
            resultado = "Reprovado"
        }
        else{
            resultado = "Aprovado"
        }
    }
    
    alert(resultado)
</script>
