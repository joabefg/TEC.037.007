<!-- "O primeiro a entrar é o primeiro a sair"
Pense em uma fila de banco 🏦. Quem chegou primeiro, é atendido primeiro. Justo, né? -->

<script>
    let fila = ["cappucino"];
    fila.push("latte");
    fila.push("macchiato");
    fila.push("mocha");
    alert(fila);
    fila.shift();
    alert(fila);
    fila.shift()
    alert(fila);
    fila.shift()
    alert(fila);
    
</script>
