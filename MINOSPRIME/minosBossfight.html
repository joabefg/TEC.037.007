<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MINOS PRIME</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container my-3">
      <div class="card bg-dark text-light border-0 shadow-lg">
        <div class="card-header bg-black text-center border-bottom border-secondary">MINOS PRIME</div>
        <div class="card-body p-0" id="tela">
          <div id="v1-panel" class="transparent-panel p-2 rounded" style="width: 225px;">
            <div class="v1-status text-center">
              <div class="fighter-name mb-2">V1</div>
              <div class="mb-1">
                <progress id="hp-V1" value="100" max="100" class="progress-fill" style="accent-color: red"></progress>
              </div>
              <div>
                <progress id="stamina-V1" value="3" max="3" class="progress-fill" style="accent-color: rgb(1, 111, 255)"></progress>
              </div>
            </div>
            <div class="mt-2 text-center">
              <img src="assets/v1-ultrakill.gif" class="fighter-img fighter-img-left" alt="V1 ULTRAKILL" />
                <button class="btn btn-alert" style="color: white;">ATTACK</button>
                <button class="btn btn-alert" style="color: rgb(0, 102, 255);">PARRY</button>
            </div>
          </div>

          <div id="minos-panel" class="transparent-panel p-2 rounded text-center">
            <ul class="list-group list-group-flush">
              <li class="list-group-item fighter-name bg-transparent border-0">MINOS PRIME</li>
              <li class="list-group-item bg-transparent border-0 p-1">
                <progress id="hp-MINOSPRIME" value="130" max="130" class="progress-fill" style="accent-color: red"></progress>
              </li>
              <li class="list-group-item bg-transparent border-0 p-1">
                <progress id="stamina-MINOSPRIME" value="10" max="10" class="progress-fill" style="accent-color: orange"></progress>
              </li>
            </ul>
            <div class="mt-2">
              <img src="assets/gifminosPrime.gif" class="fighter-img fighter-img-right" alt="MINOS PRIME" />
            </div>
          </div>

          <div class="row game-row align-items-center">
            <div class="col text-muted">
              <!-- Espaço de arena / status adicional (V1 e MINOS já com gifs nos painéis) -->
            </div>
          </div>
        </div>
        <div class="card-footer bg-black border-top border-secondary"></div>
      </div>
    </div>
  </body>
</html>
