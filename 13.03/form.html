<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap: Form Variado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="mb-3 text-primary">Cadastro Rápido</h5>
                <form id="meuForm">
                    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome Completo" required>
                    <div class="row g-2 mb-2">
                        <div class="col-6"><input type="tel" id="tel" class="form-control" placeholder="Telefone"></div>
                        <div class="col-6"><input type="email" id="email" class="form-control" placeholder="E-mail"></div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label d-block small fw-bold">Vínculo:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="vinculo" value="Professor" checked>
                            <label class="form-check-label">Professor</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="vinculo" value="Aluno">
                            <label class="form-check-label">Aluno</label>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label d-block small fw-bold">Interesses:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input check-area" type="checkbox" value="Dev"> <label>Dev</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input check-area" type="checkbox" value="Design"> <label>Design</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Satisfação: <span id="valSatisfacao">50</span>%</label>
                        <input type="range" class="form-range" id="satisfacao" oninput="valSatisfacao.innerText=this.value">
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Salvar Dados</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div id="alertaSucesso" class="alert alert-success d-none shadow-sm">
                ✅ Registro adicionado com sucesso à tabela!
            </div>
            
            <div class="table-responsive bg-white rounded shadow-sm">
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome/Contato</th>
                            <th>Vínculo</th>
                            <th>Interesses</th>
                            <th>Satis.</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('meuForm').onsubmit = function(e) {
        e.preventDefault();
        
        // Captura valores
        const nome = document.getElementById('nome').value;
        const contato = `${document.getElementById('tel').value} | ${document.getElementById('email').value}`;
        const vinculo = document.querySelector('input[name="vinculo"]:checked').value;
        const satisfacao = document.getElementById('satisfacao').value;
        
        // Pega os checkboxes marcados
        const interesses = Array.from(document.querySelectorAll('.check-area:checked'))
                                .map(c => c.value).join(', ') || '-';

        // Cria a linha na tabela
        const linha = `<tr>
            <td><strong>${nome}</strong><br><small class="text-muted">${contato}</small></td>
            <td><span class="badge bg-secondary">${vinculo}</span></td>
            <td>${interesses}</td>
            <td><div class="progress" style="height: 8px;"><div class="progress-bar" style="width: ${satisfacao}%"></div></div></td>
        </tr>`;

        document.getElementById('corpoTabela').innerHTML += linha;

        // Alerta e Reset
        const alerta = document.getElementById('alertaSucesso');
        alerta.classList.remove('d-none');
        setTimeout(() => alerta.classList.add('d-none'), 3000);
        this.reset();
        document.getElementById('valSatisfacao').innerText = "50";
    };
</script>

</body>
</html>
